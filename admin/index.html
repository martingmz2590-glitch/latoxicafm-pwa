<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | La Tóxica Radio</title>

    <link rel="stylesheet"
          href="css/login.css">

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <h1>LA TÓXICA RADIO</h1>

            <p>Panel Administrativo</p>

            <form id="loginForm">

                <input
                    type="text"
                    id="username"
                    placeholder="Usuario">

                <input
                    type="password"
                    id="password"
                    placeholder="Contraseña">

                <button type="submit">

                    Iniciar sesión

                </button>

            </form>

        </div>

    </div>







    <script src="login.js"></script>

</body>

</html>
