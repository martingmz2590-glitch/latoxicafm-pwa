<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Administración de Banners | La Tóxica Radio</title>

    <link rel="stylesheet" href="../css/banners.css">

</head>

<body>

    <header>

        <h1>Panel Administrativo</h1>

    </header>

    <main>

        <div class="page-header">

            <h2>Administración de Banners</h2>

            <button id="nuevoBanner">
                + Nuevo Banner
            </button>

        </div>

        <div class="table-container">

            <table>

                <thead>

                    <tr>

                        <th>#</th>

                        <th>Imagen</th>

                        <th>Título</th>

                        <th>Orden</th>

                        <th>Estado</th>

                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody id="tablaBanners">

                    <tr>

                        <td colspan="6" class="sin-registros">

                            No hay banners registrados.

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </main>

    <script src="../js/banners.js"></script>

</body>

</html>
